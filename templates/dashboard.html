{% extends "base.html" %}

{% block content %}

<h1 class="title">Dashboard</h1>

<div class="dash-row">

    <div class="dash-card open">
        <div class="dash-label">Open Tasks</div>
        <div class="dash-number">{{ open_tasks }}</div>
    </div>

    <div class="dash-card progress">
        <div class="dash-label">In Progress</div>
        <div class="dash-number">{{ in_progress }}</div>
    </div>

    <div class="dash-card request">
        <div class="dash-label">Open Requests</div>
        <div class="dash-number">{{ open_requests }}</div>
    </div>

    <div class="dash-card ticket">
        <div class="dash-label">Open Tickets</div>
        <div class="dash-number">{{ open_tickets }}</div>
    </div>

    <div class="dash-card completed">
        <div class="dash-label">Completed</div>
        <div class="dash-number">{{ completed }}</div>
    </div>

</div>

<style>
.dash-row {
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
    margin-top: 8px;
}

.dash-card {
    flex: 1 1 160px;
    background: var(--cream);
    border-radius: 12px;
    padding: 24px 20px;
    border: 1px solid var(--border);
    border-left-width: 5px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}

.dash-label {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin-bottom: 10px;
}

.dash-number {
    font-size: 36px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
}

.dash-card.open      { border-left-color: #b91c1c; }
.dash-card.progress  { border-left-color: #d97706; }
.dash-card.request   { border-left-color: #6d28d9; }
.dash-card.ticket    { border-left-color: #0e7490; }
.dash-card.completed { border-left-color: #166534; }
</style>

{% endblock %}
