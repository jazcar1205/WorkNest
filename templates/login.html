<!DOCTYPE html>
<html>
<head>
    <title>Welcome - WorkNest</title>
    <style>
        body {
            margin: 0;
            font-family: Courier New;
            background: #EADDCA;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            color: #555;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #2c3e50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            background: #1a252f;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🎉 Welcome!</h1>
    <p>You have successfully logged in.</p>

    <a href="/Dashboard" class="btn">Go to Dashboard</a>
</div>

</body>
</html>
