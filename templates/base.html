<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkNest</title>

    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --brown:       #80461B;
            --brown-dark:  #5a2f12;
            --brown-mid:   #a0612d;
            --beige:       #F5E6D3;
            --cream:       #fffaf5;
            --border:      #dcc9b0;
            --text:        #2d1a0e;
            --text-muted:  #8a6a50;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            background: var(--beige);
            color: var(--text);
        }

        /* ── NAVBAR ───────────────────────────────────── */
        .navbar {
            background: var(--brown);
            padding: 0 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 56px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.18);
        }

        .logo {
            font-family: 'Pacifico', cursive;
            color: white;
            font-size: 22px;
            letter-spacing: 0.5px;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 4px;
        }

        .nav-links a {
            color: rgba(255,255,255,0.85);
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.15s, color 0.15s;
        }

        .nav-links a:hover {
            background: rgba(255,255,255,0.15);
            color: white;
        }

        .create-btn {
            background: white;
            color: var(--brown);
            padding: 7px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
            transition: background 0.15s;
        }

        .create-btn:hover {
            background: #f3e5d6;
        }

        /* ── PAGE CONTENT ─────────────────────────────── */
        .content {
            padding: 28px 32px;
        }

        /* ── SHARED: TITLE ────────────────────────────── */
        .title {
            font-family: 'Pacifico', cursive;
            color: var(--brown);
            margin: 0 0 24px 0;
            font-size: 26px;
        }

        /* ── SHARED: CARD ─────────────────────────────── */
        .card {
            background: var(--cream);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }

        /* ── SHARED: CONTAINER (page-level card) ─────── */
        .container {
            background: var(--cream);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }

        /* ── SHARED: FORM ELEMENTS ────────────────────── */
        label {
            display: block;
            font-weight: 600;
            color: var(--brown);
            margin-bottom: 4px;
            font-size: 13px;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px 10px;
            margin-bottom: 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            background: white;
            color: var(--text);
            outline: none;
            transition: border-color 0.15s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--brown-mid);
            box-shadow: 0 0 0 3px rgba(128,70,27,0.1);
        }

        input:disabled, select:disabled {
            background: #f8f2ec;
            color: var(--text-muted);
            cursor: default;
        }

        textarea {
            resize: vertical;
            height: 120px;
        }

        /* ── SHARED: BUTTONS ─────────────────────────── */
        .btn {
            display: inline-block;
            padding: 8px 18px;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: background 0.15s, opacity 0.15s;
        }

        .btn-primary {
            background: var(--brown);
            color: white;
        }
        .btn-primary:hover { background: var(--brown-dark); }

        .btn-secondary {
            background: #f0e6da;
            color: var(--brown);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover { background: #e8d8c8; }

        .btn-danger {
            background: #c0392b;
            color: white;
        }
        .btn-danger:hover { background: #992d22; }

        /* ── SHARED: TABLE ───────────────────────────── */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 10px 12px;
            border-bottom: 2px solid var(--border);
            color: var(--brown);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td {
            padding: 11px 12px;
            border-bottom: 1px solid #ede3d8;
            color: var(--text);
        }

        tr:last-child td { border-bottom: none; }

        tr.clickable-row { cursor: pointer; }
        tr.clickable-row:hover td { background: #fdf0e4; }

        /* ── SHARED: STATUS BADGES ───────────────────── */
        .status {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status.open {
            background: #fde8e8;
            color: #b91c1c;
        }

        .status.in-progress {
            background: #fef3cd;
            color: #92600a;
        }

        .status.completed {
            background: #dcfce7;
            color: #166534;
        }

        /* ── SHARED: MODAL ───────────────────────────── */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            inset: 0;
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(2px);
        }

        .modal-content {
            background: var(--cream);
            margin: 6% auto;
            padding: 28px 32px;
            border: 1px solid var(--border);
            border-radius: 14px;
            width: 480px;
            max-width: 94vw;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            margin: 0;
            font-size: 16px;
            color: var(--brown);
        }

        .close {
            font-size: 20px;
            cursor: pointer;
            color: var(--text-muted);
            background: none;
            border: none;
            padding: 0;
            line-height: 1;
        }
        .close:hover { color: var(--text); }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-actions .btn-danger { margin-left: auto; }

        /* ── SHARED: EMPTY STATE ─────────────────────── */
        .empty {
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
            padding: 28px 0;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <a href="/Dashboard" class="logo">WorkNest</a>

    <div class="nav-links">
        <a href="/Dashboard">Dashboard</a>
        <a href="/openTasks">Tasks</a>
        <a href="/openRequests">Requests</a>
        <a href="/openTickets">Tickets</a>
        <a href="/assigned">My Work</a>
        <a href="/appointments">Appointments</a>
    </div>

    <a href="/create" class="create-btn">+ Create</a>
</nav>

<!-- PAGE CONTENT -->
<div class="content">
    {% block content %}{% endblock %}
</div>

</body>
</html>
