{% extends "base.html" %}

{% block content %}

<div class="page-header">
    <h1 class="page-title">Feedback</h1>
    <p class="page-subtitle">Share your thoughts with us</p>
</div>

<div style="max-width: 580px;">

    <!-- FEEDBACK FORM -->
    <div class="section-card" id="feedback-form-card">
        <div id="form-view">
            <div class="section-title">Submit Feedback</div>

            <label for="fb-date">Date</label>
            <input type="date" id="fb-date" required>

            <label for="fb-text">Feedback</label>
            <textarea id="fb-text" rows="6" placeholder="Write your feedback here…" required></textarea>

            <div style="display:flex; justify-content:flex-end; margin-top:4px;">
                <button class="btn btn-primary" id="submit-btn" onclick="submitFeedback()">Submit</button>
            </div>
        </div>

        <!-- THANK YOU STATE -->
        <div id="thankyou-view" style="display:none; text-align:center; padding: 32px 16px;">
            <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#6BAE6B" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:16px;">
                <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
                <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
            <h2 style="margin:0 0 8px; font-size:20px; font-weight:700; color:var(--text);">Thank you for your response!</h2>
            <p style="color:var(--text-muted); margin:0 0 28px; font-size:14px;">Your feedback has been recorded.</p>

            <div id="choice-view" style="display:none; flex-direction:column; gap:12px; align-items:center;">
                <p style="font-size:13.5px; color:var(--text-muted); margin:0;">What would you like to do next?</p>
                <div style="display:flex; gap:12px; flex-wrap:wrap; justify-content:center;">
                    <button class="btn btn-secondary" onclick="submitAnother()">Submit Another Feedback</button>
                    <a href="/Dashboard" class="btn btn-primary">Go to Home Page</a>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
function submitFeedback() {
    const date = document.getElementById('fb-date').value.trim();
    const feedback = document.getElementById('fb-text').value.trim();

    if (!date) {
        alert('Please select a date.');
        return;
    }
    if (!feedback) {
        alert('Please enter your feedback.');
        return;
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Submitting…';

    fetch('/submit_feedback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ date, feedback })
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            document.getElementById('form-view').style.display = 'none';
            document.getElementById('thankyou-view').style.display = 'block';

            // Wait 1.5s then reveal the choice buttons
            setTimeout(function() {
                document.getElementById('choice-view').style.display = 'flex';
            }, 1500);
        } else {
            alert('Something went wrong. Please try again.');
            btn.disabled = false;
            btn.textContent = 'Submit';
        }
    })
    .catch(function() {
        alert('Something went wrong. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Submit';
    });
}

function submitAnother() {
    document.getElementById('fb-date').value = '';
    document.getElementById('fb-text').value = '';
    document.getElementById('submit-btn').disabled = false;
    document.getElementById('submit-btn').textContent = 'Submit';
    document.getElementById('thankyou-view').style.display = 'none';
    document.getElementById('choice-view').style.display = 'none';
    document.getElementById('form-view').style.display = 'block';
}
</script>

{% endblock %}
