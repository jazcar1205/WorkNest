<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GQJB1KQKF8"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-GQJB1KQKF8');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TacklNest — Set Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #F4F0EC;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .set-card {
            background: #FFFFFF;
            border-radius: 16px;
            border: 1px solid #E4D8CC;
            box-shadow: 0 4px 24px rgba(0,0,0,0.09);
            padding: 52px 56px;
            width: 440px;
            max-width: 94vw;
        }

        .brand {
            font-family: 'Pacifico', cursive;
            color: #80461B;
            font-size: 22px;
            margin-bottom: 28px;
            display: block;
            text-decoration: none;
        }

        .card-title {
            font-size: 21px;
            font-weight: 700;
            color: #1C0A02;
            margin: 0 0 6px;
        }

        .card-note {
            font-size: 13px;
            color: #8A7060;
            margin: 0 0 8px;
        }

        .username-chip {
            display: inline-block;
            background: #F5EDE4;
            color: #80461B;
            font-size: 13px;
            font-weight: 600;
            padding: 3px 12px;
            border-radius: 20px;
            margin-bottom: 28px;
        }

        label {
            display: block;
            font-size: 11.5px;
            font-weight: 600;
            color: #8A7060;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="password"] {
            width: 100%;
            padding: 10px 13px;
            margin-bottom: 18px;
            border: 1px solid #E4D8CC;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            background: #FFFFFF;
            color: #1C0A02;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        input[type="password"]:focus {
            border-color: #C87941;
            box-shadow: 0 0 0 3px rgba(200,121,65,0.12);
        }

        .error-box {
            background: #FEF2F2;
            border: 1px solid #FECACA;
            color: #991B1B;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 18px;
        }

        .btn-submit {
            display: block;
            width: 100%;
            padding: 12px;
            background: #80461B;
            color: white;
            border: none;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-submit:hover { background: #5a2f12; }

        .hint {
            font-size: 11px;
            color: #B0968A;
            margin-top: -14px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>

<div class="set-card">
    <span class="brand">TacklNest</span>

    <h1 class="card-title">Set your password</h1>
    <p class="card-note">First-time setup for your account</p>
    <span class="username-chip">{{ username }}</span>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/set-password">
        <label for="password">New Password</label>
        <input type="password" id="password" name="password" placeholder="Min. 6 characters" required autofocus>
        <p class="hint">Minimum 6 characters</p>

        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter your password" required>

        <button type="submit" class="btn-submit">Set Password</button>
    </form>
</div>

</body>
</html>
