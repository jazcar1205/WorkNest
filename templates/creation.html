{% extends "base.html" %}

{% block content %}

<h1 class="title">Create Item</h1>

<div class="container">
    <div class="row">

        <!-- LEFT SIDE -->
        <div class="left">
            <form method="POST" action="/create_item">

                <label>Type</label>
                <select name="type">
                    <option>Task</option>
                    <option>Request</option>
                    <option>Ticket</option>
                </select>

                <label>Assigned</label>
                <input type="text" name="assigned" placeholder="Enter name">

                <label>Day Created</label>
                <input type="date" name="created">

                <label>Due Date</label>
                <input type="date" name="due">

                <label>Status</label>
                <select name="status" id="statusSelect" onchange="updateStatusPreview()">
                    <option value="Open">Open</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Completed">Completed</option>
                </select>

                <!-- 🔥 Status Preview -->
                <div class="preview">
                    Preview:
                    <span id="statusPreview" class="status open">Open</span>
                </div>
        </div>

        <!-- RIGHT SIDE -->
        <div class="right">
                <label>Description</label>
                <textarea name="description" placeholder="Enter description..."></textarea>

                <button type="submit">Create Item</button>
            </form>
        </div>

    </div>
</div>

<script>
function updateStatusPreview() {
    const select = document.getElementById("statusSelect");
    const preview = document.getElementById("statusPreview");

    const value = select.value;
    const className = value.toLowerCase().replace(" ", "-");

    preview.className = "status " + className;
    preview.innerText = value;
}
</script>

<style>

/* Title */
.title {
    font-family: 'Pacifico', cursive;
    color: #80461B;
}

/* Container */
.container {
    margin-top: 20px;
    background: #fffaf5;
    border: 2px solid #80461B;
    border-radius: 12px;
    padding: 20px;
}

/* Layout */
.row {
    display: flex;
    gap: 20px;
}

.left, .right {
    width: 50%;
}

/* Inputs */
input, select, textarea {
    width: 100%;
    padding: 8px;
    margin: 8px 0;
    border: 1px solid #ccc;
    border-radius: 6px;
}

textarea {
    height: 120px;
}

/* Button */
button {
    background: #80461B;
    color: white;
    border: none;
    padding: 10px;
    margin-top: 10px;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #5a2f12;
}

label {
    font-weight: bold;
    color: #80461B;
}

/* Status Preview */
.preview {
    margin-top: 10px;
    font-size: 14px;
}

/* Status Badge */
.status {
    padding: 4px 10px;
    border-radius: 8px;
    margin-left: 10px;
}

/* Colors */
.status.open {
    background: #ffe5e5;
    color: red;
    font-weight: bold;
}

.status.in-progress {
    background: #fff4e5;
    color: orange;
    font-weight: bold;
}

.status.completed {
    background: #e6ffe6;
    color: green;
    font-weight: bold;
}

</style>

{% endblock %}
