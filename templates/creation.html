{% extends "base.html" %}

{% block content %}

<h1 class="title">Create Item</h1>

<div class="container" style="max-width:720px">
    <form method="POST" action="/create_item">
        <div class="form-row">

            <!-- LEFT -->
            <div class="form-col">
                <label>Type</label>
                <select name="type">
                    <option>Task</option>
                    <option>Request</option>
                    <option>Ticket</option>
                </select>

                <label>Assigned To</label>
                <input type="text" name="assigned" placeholder="Enter name">

                <label>Day Created</label>
                <input type="date" name="created">

                <label>Due Date</label>
                <input type="date" name="due">

                <label>Status</label>
                <select name="status" id="statusSelect" onchange="updateStatusPreview()">
                    <option value="Open">Open</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Completed">Completed</option>
                </select>

                <div class="preview-row">
                    <span style="font-size:13px;color:var(--text-muted)">Preview:</span>
                    <span id="statusPreview" class="status open">Open</span>
                </div>
            </div>

            <!-- RIGHT -->
            <div class="form-col">
                <label>Description</label>
                <textarea name="description" placeholder="Describe the item..." style="height:180px"></textarea>

                <button type="submit" class="btn btn-primary" style="width:100%;margin-top:4px">Create Item</button>
            </div>

        </div>
    </form>
</div>

<script>
function updateStatusPreview() {
    const select = document.getElementById("statusSelect");
    const preview = document.getElementById("statusPreview");
    const className = select.value.toLowerCase().replace(" ", "-");
    preview.className = "status " + className;
    preview.innerText = select.value;
}
</script>

<style>
.form-row {
    display: flex;
    gap: 28px;
}

.form-col {
    flex: 1;
}

.preview-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 4px;
}
</style>

{% endblock %}
