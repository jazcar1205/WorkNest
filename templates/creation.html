{% extends "base.html" %}

{% block content %}

<h1 style="font-family: 'Pacifico', cursive; color:#80461B;">Create Item</h1>

<div class="container">
    <div class="row">

        <!-- LEFT SIDE -->
        <div class="left">
            <form method="POST" action="/create_item">

                <label>Type</label>
                <select name="type">
                    <option>Task</option>
                    <option>Request</option>
                    <option>Ticket</option>
                </select>

                <label>Assigned</label>
                <input type="text" name="assigned">

                <label>Day Created</label>
                <input type="date" name="created">

                <label>Due Date</label>
                <input type="date" name="due">

                <label>Status</label>
                <select name="status">
                    <option>Open</option>
                    <option>In Progress</option>
                    <option>Completed</option>
                </select>
        </div>

        <!-- RIGHT SIDE -->
        <div class="right">
                <label>Description</label>
                <textarea name="description"></textarea>

                <button type="submit">Create Item</button>
            </form>
        </div>

    </div>
</div>

<style>
.container {
    margin-top: 20px;
    background: #fffaf5;
    border: 2px solid #80461B;
    border-radius: 12px;
    padding: 20px;
}

.row {
    display: flex;
    gap: 20px;
}

.left, .right {
    width: 50%;
}

/* Inputs */
input, select, textarea {
    width: 100%;
    padding: 8px;
    margin: 8px 0;
    border: 1px solid #ccc;
    border-radius: 6px;
}

textarea {
    height: 120px;
}

/* Button */
button {
    background: #80461B;
    color: white;
    border: none;
    padding: 10px;
    margin-top: 10px;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #5a2f12;
}

label {
    font-weight: bold;
    color: #80461B;
}
</style>

{% endblock %}
