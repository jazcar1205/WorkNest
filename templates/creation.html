{% extends "base.html" %}

{% block content %}

<div class="page-header">
    <h1 class="page-title">Create Item</h1>
    <p class="page-subtitle">Add a new task, request, or ticket</p>
</div>

<div class="section-card" style="max-width:760px">
    <form method="POST" action="/create_item">
        <div class="create-layout">

            <!-- LEFT -->
            <div class="create-col">
                <label>Type</label>
                <select name="type">
                    <option>Task</option>
                    <option>Request</option>
                    <option>Ticket</option>
                </select>

                <label>Assigned To <span class="req-star">*</span></label>
                <input type="text" name="assigned" placeholder="Enter a name" required>

                <div style="display:flex;gap:14px">
                    <div style="flex:1">
                        <label>Date Created <span class="req-star">*</span></label>
                        <input type="date" name="created" required>
                    </div>
                    <div style="flex:1">
                        <label>Due Date</label>
                        <input type="date" name="due">
                    </div>
                </div>

                <label>Status</label>
                <select name="status" id="statusSelect" onchange="updatePreview()">
                    <option value="Open">Open</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Completed">Completed</option>
                </select>

                <div class="preview-row">
                    <span style="font-size:12px;color:var(--text-muted)">Preview</span>
                    <span id="statusPreview" class="status open">Open</span>
                </div>
            </div>

            <!-- RIGHT -->
            <div class="create-col">
                <label>Description <span class="req-star">*</span></label>
                <textarea name="description" placeholder="Describe what needs to be done..." style="height:200px;margin-bottom:20px" required></textarea>

                <button type="submit" class="btn btn-primary" style="width:100%;padding:11px;font-size:14px">
                    Create Item
                </button>
            </div>

        </div>
    </form>
</div>

<script>
function updatePreview() {
    const select = document.getElementById("statusSelect");
    const preview = document.getElementById("statusPreview");
    preview.className = "status " + select.value.toLowerCase().replace(" ", "-");
    preview.textContent = select.value;
}
</script>

<style>
.create-layout {
    display: flex;
    gap: 32px;
}

.create-col { flex: 1; }

.preview-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: -4px;
}

.req-star { color: #DC2626; }
</style>

{% endblock %}
