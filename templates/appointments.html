{% extends "base.html" %}

{% block content %}

<h1 style="font-family: 'Pacifico', cursive; color:#80461B;">Appointments</h1>

<div class="main">

    <!-- LEFT SIDE -->
    <div class="left">

        <!-- Upcoming -->
        <div class="card">
            <h3>Upcoming</h3>
            {% for appt in appointments %}
                <p><strong>{{ appt.date }}</strong> - {{ appt.description }}</p>
            {% endfor %}
        </div>

        <!-- Create -->
        <div class="card">
            <h3>Create Appointment</h3>
            <form method="POST" action="/create_appointment">
                <input type="date" name="date" required>
                <input type="text" name="time" placeholder="Time">
                <input type="text" name="invite" placeholder="Invite">
                <textarea name="description" placeholder="Description"></textarea>
                <button type="submit">Create</button>
            </form>
        </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="right">
        <div class="card">
            <h3>Month</h3>
            <div class="calendar">
                {% for i in range(30) %}
                    <div class="day"></div>
                {% endfor %}
            </div>
        </div>
    </div>

</div>

<style>
.main {
    display: flex;
    gap: 20px;
}

/* Layout */
.left {
    width: 35%;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.right {
    width: 65%;
}

/* Cards */
.card {
    background: #fffaf5;
    border: 2px solid #80461B;
    border-radius: 12px;
    padding: 15px;
}

/* Calendar */
.calendar {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    margin-top: 10px;
}

.day {
    border: 1px solid #80461B;
    height: 80px;
}

/* Inputs */
input, textarea {
    width: 100%;
    margin: 6px 0;
    padding: 6px;
    border: 1px solid #ccc;
    border-radius: 4px;
}

/* Button */
button {
    background: #80461B;
    color: white;
    border: none;
    padding: 8px;
    margin-top: 10px;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #5a2f12;
}
</style>

{% endblock %}
